id: crlf-custom-path-injection

info:
  name: Custom CRLF Injection Test (test:crlf;testt reflection)
  author: grok
  severity: medium
  description: Tests for CRLF injection via specific encoded paths. Detects reflection of "test:crlf;testt" in any response headers.
  tags: crlf,header-injection,generic

http:
  - method: GET
    path:
      - "{{BaseURL}}//test%3Acrlf%3Btestt.js"
      - "{{BaseURL}}/\test%3Acrlf%3Btestt.js"
      - "{{BaseURL}}/test%3Acrlf%3Btestt.js"
      - "{{BaseURL}}\test%3Acrlf%3Btestt.js"

    # Optional: Add more variations if needed
    # - "{{BaseURL}}//test:crlf;testt.js"
    # - "{{BaseURL}}/?param=test%3Acrlf%3Btestt.js"

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: regex
        part: header
        regex:
          - "(?i)test:crlf;testt"
        # This catches the string anywhere in headers (case-insensitive)
      
      - type: word
        part: header
        words:
          - "test:crlf;testt"
        # Fallback word matcher
