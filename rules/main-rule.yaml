id: crlf-custom-header-injection

info:
  name: CRLF Header Injection Test - testtheader:testt.js
  author: grok
  severity: high
  description: Tests multiple CRLF payloads and detects clean injected header "testtheader:testt.js"
  tags: crlf,header-injection

http:
  - method: GET
    path:
      - "{{BaseURL}}//{{payload}}.js"
      - "{{BaseURL}}/\\{{payload}}.js"
      - "{{BaseURL}}/{{payload}}.js"
      - "{{BaseURL}}\\{{payload}}.js"

    payloads:
      payload:
        - testt%0d%0atesttheader:testt
        - testt%0atesttheader:testt
        - testt%0dtesttheader:testt
        - testt%250d%250atesttheader:testt
        - testt%E5%98%8Atesttheader:testt
        - testt%E5%98%8Dtesttheader:testt
        - testt%E5%98%8D%E5%98%8Atesttheader:testt
        - testt%09testtheader:testt
        - testt%00%0d%0atesttheader:testt

    stop-at-first-match: true
    matchers-condition: and

    matchers:
      - type: regex
        part: header
        regex:
          - "(?i)testtheader\\s*:\\s*testt\\.js"

      - type: regex
        part: header
        regex:
          - "(?i)(%0d|%0a|%09|%00|%25[0-9a-fA-F]{2}|E5%98)"
        negate: true
